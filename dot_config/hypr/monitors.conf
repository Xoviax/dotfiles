################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
env = GDK_SCALE,1

monitor=DP-2,1920x1080@144,0x0,1
monitor=DP-3,2560x1440@164.83,1920x0,1

# Portrait RIGHT (clockwise)
monitor=HDMI-A-1,1920x1080@60,4480x0,1,transform,1

# Portrait LEFT (counter-clockwise)
monitor=DP-1,3840x1100@60.02,5560x0,2,transform,3

workspace = 1, monitor:DP-3, persistent:true
workspace = 2, monitor:DP-3, persistent:true
workspace = 3, monitor:DP-3, persistent:true
workspace = 4, monitor:DP-2, persistent:true
workspace = 5, monitor:DP-2, persistent:true
workspace = 6, monitor:DP-2, persistent:true
workspace = 7, monitor:HDMI-A-1, persistent:true
workspace = 8, monitor:HDMI-A-1, persistent:true
workspace = 9, monitor:HDMI-A-1, persistent:true
workspace = 10, monitor:DP-1, persistent:true